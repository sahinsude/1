<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Kamera Test</title>
  <style>
    body { background: #111; color: #fff; font-family: Arial; text-align: center; padding: 50px; }
    video { width: 640px; height: 480px; border: 3px solid #0f0; margin: 20px; }
    button { padding: 15px 40px; font-size: 24px; background: #00aa00; color: white; border: none; cursor: pointer; }
    button:hover { background: #00ff00; }
  </style>
</head>
<body>
  <h1>Kamera ve Mikrofon Testi</h1>
  <p>Butona basınca Chrome izin soracak. "Allow" dersen açılır.</p>
  <button onclick="start()">KAMERA + MİKROFON AÇ</button>
  <br>
  <video id="video" autoplay playsinline muted></video>

  <script>
    async function start() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ 
          video: true, 
          audio: true 
        });
        document.getElementById('video').srcObject = stream;
        console.log("Başarılı! Erişim alındı.");
      } catch (err) {
        console.error("Hata:", err);
        alert("İzin verilmedi veya hata: " + err.message);
      }
    }
  </script>
</body>
</html>
